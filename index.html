<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♪ 萌豚挑战 - 二次元听歌猜番剧</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <!-- Background Decorations -->
    <div class="bg-deco bg-deco-1"></div>
    <div class="bg-deco bg-deco-2"></div>
    <div class="bg-deco bg-deco-3"></div>

    <!-- Flash Overlay -->
    <div id="flashOverlay"></div>

    <!-- Sakura Particles -->
    <canvas id="sakuraCanvas"></canvas>

    <div class="app">
        <div class="container">
            <!-- Header -->
            <header class="header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 32 32" width="22" height="22">
                            <path d="M12 6C12 6 14 4 16 6C18 4 20 6 20 6L20 20C20 20 18 22 16 20C14 22 12 20 12 20Z" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,0.6)" stroke-width="0.5"/>
                            <circle cx="12" cy="22" r="4" fill="rgba(255,255,255,0.95)"/>
                            <circle cx="20" cy="20" r="3.5" fill="rgba(255,255,255,0.9)"/>
                        </svg>
                    </div>
                    <span class="logo-text">萌豚挑战</span>
                </div>
                <div class="header-right">
                    <div class="status-pill">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="uidText">...</span>
                    </div>
                </div>
            </header>

            <!-- Floating Bangumi Panel -->
            <div id="bangumiFAB" style="position:fixed;bottom:24px;right:24px;z-index:9999;">
                <div style="position:relative;">
                    <button id="bangumiToggle" style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#E88D7D,#D4A574);color:#fff;border:none;cursor:pointer;box-shadow:0 6px 24px rgba(232,141,125,0.4), 0 0 20px rgba(232,141,125,0.2);display:flex;align-items:center;justify-content:center;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </button>
                </div>
                <style>
                    #bangumiToggle:hover {
                        transform: scale(1.1) rotate(5deg);
                        box-shadow: 0 8px 32px rgba(232,141,125,0.5), 0 0 30px rgba(232,141,125,0.3) !important;
                    }
                </style>
                <div id="bangumiPanel" style="display:none;position:absolute;bottom:52px;right:0;width:300px;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.15);padding:14px;border:1px solid #eee;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                        <span style="font-weight:700;font-size:14px;color:#333;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>自定义曲库</span>
                        <button id="bangumiClose" style="width:24px;height:24px;border-radius:50%;border:none;background:#f0f0f0;cursor:pointer;font-size:12px;color:#666;display:flex;align-items:center;justify-content:center;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                    </div>
                    <div style="display:flex;gap:6px;margin-bottom:8px;">
                        <input type="text" id="bangumiIndexInput" placeholder="目录号 如 75323" autocomplete="off" spellcheck="false" style="flex:1;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:#333;background:#fff;min-width:0;">
                        <button data-action="importBangumi" style="padding:8px 14px;background:linear-gradient(135deg,#E88D7D,#D4A574);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">导入</button>
                    </div>
                    <div id="importStatus" style="font-size:11px;color:#E88D7D;min-height:16px;margin-bottom:4px;"></div>
                    <div id="importProgressWrapper" style="height:3px;background:#eee;border-radius:2px;display:none;margin-bottom:8px;"><div id="importProgress" style="height:100%;width:0;background:linear-gradient(135deg,#E88D7D,#D4A574);border-radius:2px;transition:width 0.3s;"></div></div>
                    <div id="customSongsList" style="max-height:150px;overflow-y:auto;margin-bottom:8px;"></div>
                    <div style="display:flex;gap:4px;">
                        <button data-action="exportCustom" style="padding:4px 10px;font-size:11px;background:#f8f8f8;border:1px solid #ddd;border-radius:4px;cursor:pointer;color:#666;display:flex;align-items:center;gap:3px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>导出</button>
                        <button data-action="importCustom" style="padding:4px 10px;font-size:11px;background:#f8f8f8;border:1px solid #ddd;border-radius:4px;cursor:pointer;color:#666;display:flex;align-items:center;gap:3px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导入</button>
                        <button data-action="clearCustom" style="padding:4px 10px;font-size:11px;background:#f8f8f8;border:1px solid #ddd;border-radius:4px;cursor:pointer;color:#666;display:flex;align-items:center;gap:3px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>清空</button>
                    </div>
                </div>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="position:fixed;top:-100px;left:-100px;">

            <!-- Content -->
            <main class="content">

                <!-- Menu -->
                <div id="v-menu" class="menu">
                    <div class="hero">
                        <div class="hero-icon">
                            <svg viewBox="0 0 48 48" width="38" height="38">
                                <!-- Headphone band -->
                                <path d="M10 28C10 18 16 12 24 12C32 12 38 18 38 28" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                                <!-- Left ear cup -->
                                <rect x="7" y="26" width="8" height="12" rx="3" fill="rgba(255,255,255,0.95)"/>
                                <!-- Right ear cup -->
                                <rect x="33" y="26" width="8" height="12" rx="3" fill="rgba(255,255,255,0.95)"/>
                                <!-- Sound wave left -->
                                <path d="M12 30C12 30 10 32 12 34" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none" stroke-linecap="round"/>
                                <!-- Sound wave right -->
                                <path d="M36 30C36 30 38 32 36 34" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none" stroke-linecap="round"/>
                                <!-- Music note -->
                                <circle cx="21" cy="30" r="3" fill="rgba(255,255,255,0.9)"/>
                                <path d="M24 30V18" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M24 18L29 16V20L24 22" fill="rgba(255,255,255,0.85)"/>
                                <!-- Small sparkle -->
                                <circle cx="30" cy="16" r="1.5" fill="rgba(255,255,255,0.6)"/>
                                <circle cx="16" cy="14" r="1" fill="rgba(255,255,255,0.4)"/>
                            </svg>
                        </div>
                        <div class="hero-title">准备好挑战了吗？</div>
                        <div class="hero-sub">收录 <strong id="songCount">150+</strong> 首经典动漫神曲</div>
                    </div>

                    <div class="btn-group">
                        <button class="btn btn-primary" data-action="startSingle">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>
                            单人挑战
                        </button>
                        <button class="btn btn-secondary" data-action="showView" data-value="lobby">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"/><path d="M13 19l6-6"/><path d="M16 16l4 4"/><path d="M19 21l2-2"/></svg>
                            联机对战
                        </button>
                    </div>

                    <div class="menu-footer">
                        <button class="btn-ghost" data-action="openSettings">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                            设置
                        </button>
                        <button class="btn-ghost" data-action="showView" data-value="leaderboard">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px;"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                            排行榜
                        </button>
                    </div>

                    <div id="favSection" class="fav-section" style="display:none;">
                        <div class="fav-header">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="vertical-align:-2px;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            我的歌单
                            <span class="fav-count" id="favCount">0</span>
                            <button class="fav-clear-btn" data-action="clearFavorites" title="清空收藏">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                        <div class="fav-controls">
                            <button class="fav-ctrl-btn" data-action="playAllFavs">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                                全部播放
                            </button>
                            <button class="fav-ctrl-btn" data-action="shufflePlayFavs">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
                                随机播放
                            </button>
                            <button class="fav-ctrl-btn" data-action="sequentialPlayFavs">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                                顺序播放
                            </button>
                        </div>
                        <div id="favList" class="fav-list"></div>
                    </div>

                </div>

                <!-- Lobby -->
                <div id="v-lobby" class="lobby hidden">
                    <button class="back-btn" data-action="showView" data-value="menu">← 返回</button>
                    <div class="section-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"/><path d="M13 19l6-6"/><path d="M16 16l4 4"/><path d="M19 21l2-2"/></svg>联机对战大厅</div>

                    <div class="card">
                        <div class="card-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>创建房间</div>
                        <button class="btn btn-primary" data-action="pkCreate">创建新房间</button>
                    </div>

                    <div class="divider">或者</div>

                    <div class="card">
                        <div class="card-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>加入房间</div>
                        <input class="input" id="roomIdInput" placeholder="输入4位房间号" maxlength="4">
                        <button class="btn btn-secondary" data-action="pkJoin">加入对战</button>
                    </div>
                </div>

                <!-- Room -->
                <div id="v-room" class="room hidden">
                    <div class="room-id-box">
                        <div class="room-id-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>房间号 (发给好友)</div>
                        <div class="room-id" id="roomIdDisplay">----</div>
                        <button class="btn btn-sm btn-secondary" data-action="pkShare">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                            分享邀请
                        </button>
                        <div id="shareFeedback" class="share-feedback"></div>
                    </div>

                    <div class="player-grid">
                        <div class="player-card p1 active">
                            <div class="player-avatar">P1</div>
                            <div class="player-name">我</div>
                        </div>
                        <div class="player-card p2 waiting" id="p2Card">
                            <div class="player-avatar">?</div>
                            <div class="player-name">等待加入...</div>
                        </div>
                    </div>

                    <div id="roomMsg" class="room-msg"></div>

                    <button id="btnStartPk" class="btn btn-secondary" disabled data-action="pkStart">
                        等待对手加入...
                    </button>
                    <button class="btn-ghost full-width" data-action="showView" data-value="menu">
                        退出房间
                    </button>
                </div>

                <!-- Game -->
                <div id="v-game" class="hidden">
                    <button class="back-btn" data-action="showView" data-value="menu">← 退出挑战</button>
                    <div id="singleHeader" class="game-header">
                        <div class="q-nav">
                            <button class="q-nav-btn" id="prevQuestionBtn" data-action="prevQuestion" style="display:none;" aria-label="上一题">←</button>
                            <div class="q-num"><span id="qNum">1</span><span>/</span><span id="totalQ">10</span></div>
                            <button class="q-nav-btn" id="nextQuestionBtn" data-action="nextQuestion" style="display:none;" aria-label="下一题">→</button>
                        </div>
                        <div class="score"><span id="scoreText">0</span><span class="score-label">答对</span></div>
                    </div>

                    <div id="pkHeader" class="pk-score hidden">
                        <div class="pk-player">
                            <div class="pk-avatar me">我</div>
                            <div class="pk-score-num" id="myScoreText">0</div>
                        </div>
                        <div class="pk-vs">VS</div>
                        <div class="pk-player">
                            <div class="pk-score-num" id="opScoreText">0</div>
                            <div class="pk-avatar op">敌</div>
                        </div>
                    </div>

                    <div id="comboArea" class="combo"></div>

                    <div class="player-box">
                        <div id="visualizer" class="vis hidden">
                            <div class="vis-bar" style="animation-duration: 0.35s"></div>
                            <div class="vis-bar" style="animation-duration: 0.5s"></div>
                            <div class="vis-bar" style="animation-duration: 0.3s"></div>
                            <div class="vis-bar" style="animation-duration: 0.45s"></div>
                            <div class="vis-bar" style="animation-duration: 0.4s"></div>
                            <div class="vis-bar" style="animation-duration: 0.55s"></div>
                            <div class="vis-bar" style="animation-duration: 0.35s"></div>
                            <div class="vis-bar" style="animation-duration: 0.5s"></div>
                        </div>

                        <div id="playerStatus" class="player-status">准备中...</div>
                        <audio id="audioEl" crossorigin="anonymous"></audio>
                        <button id="playBtn" class="play-btn" disabled data-action="togglePlay" aria-label="播放/暂停">
                            <svg id="playIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </button>
                        <div class="player-hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>30秒试听片段</div>
                        <div class="volume">
                            <span class="vol-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span>
                            <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.5">
                        </div>
                    </div>

                    <div class="progress">
                        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                    </div>

                    <div id="songInfo" class="song-info">
                        <div class="song-info-top">
                            <span id="resultBadge" class="result-badge correct"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px;"><polyline points="20 6 9 17 4 12"/></svg>正确</span>
                        </div>
                        <div class="song-detail">
                            <div class="song-cover"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
                            <div class="song-meta">
                                <div id="songTitle" class="song-title">-</div>
                                <div id="songAnime" class="song-anime">-</div>
                                <div id="songArtist" class="song-artist">-</div>
                            </div>
                        </div>
                    </div>

                    <div id="optionsGrid" class="options"></div>
                </div>

                <!-- Leaderboard -->
                <div id="v-leaderboard" class="leaderboard hidden">
                    <button class="back-btn" data-action="showView" data-value="menu">← 返回</button>
                    <div class="section-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>本地排行榜</div>
                    <div id="recordsList"></div>
                    <button class="btn btn-sm btn-secondary full-width" style="margin-top: 20px;" data-action="clearRecords">
                        清除记录
                    </button>
                </div>

            </main>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="settings-modal-bg">
        <div class="settings-modal">
            <div class="settings-header">
                <div class="settings-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:4px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>设置</div>
                <button class="settings-close" data-action="closeSettings" aria-label="关闭"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="settings-body">
                <div class="settings-group">
                    <div class="settings-label">题目数量</div>
                    <div class="settings-chips" id="qcountChips"></div>
                </div>
                <div class="settings-group">
                    <div class="settings-label">歌曲类型</div>
                    <div class="settings-chips" id="typeChips"></div>
                </div>
                <div class="settings-group">
                    <div class="settings-label">年份范围</div>
                    <div class="settings-chips settings-chips-wrap" id="yearChips"></div>
                </div>
                <div class="settings-group">
                    <div class="settings-label">曲库来源</div>
                    <div class="settings-chips" id="sourceChips"></div>
                </div>
                <div class="settings-count" id="filterCount"></div>
            </div>
        </div>
    </div>

    <!-- End Modal -->
    <div id="endModal" class="modal-bg" role="dialog">
        <div class="modal">
            <div class="modal-emoji" id="endEmoji">🎉</div>
            <div class="modal-title" id="endTitle">挑战结束</div>
            <div class="modal-score" id="endScore">0</div>
            <div class="modal-desc" id="endDesc">不错哦！</div>
            <div class="modal-detail" id="endDetail"></div>
            <button class="btn btn-primary" data-action="restartGame"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>再来一局</button>
            <button class="btn-ghost full-width" data-action="goHome">返回主页</button>
        </div>
    </div>

    <!-- Anime Detail Modal -->
    <div id="animeDetailModal" class="detail-modal-bg">
        <div class="detail-modal">
            <button class="detail-close" data-action="closeDetail" aria-label="关闭"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            <div class="detail-cover-wrap">
                <img id="detailCover" class="detail-cover" src="" alt="封面">
            </div>
            <div class="detail-body">
                <h2 class="detail-title" id="detailTitle">-</h2>
                <div class="detail-romaji" id="detailRomaji"></div>
                <div class="detail-meta" id="detailMeta"></div>
                <div class="detail-song-row" id="detailSongInfo"></div>
                <div id="fullPlayer" class="full-player" style="display:none;">
                    <div class="fp-row">
                        <div class="fp-icon-box" id="fpIconBox">
                            <img id="fpCover" class="fp-cover" src="" alt="" style="display:none;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                            <span class="fp-cover-fallback">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                            </span>
                        </div>
                        <div class="fp-meta">
                            <div class="fp-title" id="fpTitle">-</div>
                            <div class="fp-source" id="fpSource">via YouTube</div>
                            <a id="fpYtLink" class="fp-yt-link" href="#" target="_blank" rel="noopener" style="display:none;font-size:12px;color:var(--pink);text-decoration:none;margin-top:2px;">在 YouTube 打开 →</a>
                        </div>
                        <div class="fp-actions">
                            <button class="fp-btn fp-heart" id="fpHeartBtn" data-action="toggleFavorite" aria-label="收藏">
                                <svg id="fpHeartIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            </button>
                            <div class="fp-vol-wrap">
                                <button class="fp-btn fp-vol-btn" id="fpVolBtn" aria-label="音量">
                                    <svg id="fpVolIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                                </button>
                                <div class="fp-vol-slider" id="fpVolSlider">
                                    <input type="range" min="0" max="100" value="80" id="fpVolRange" orient="vertical">
                                </div>
                            </div>
                            <button class="fp-btn fp-play" id="fpPlayBtn" data-action="toggleFullPlay" aria-label="播放">
                                <svg id="fpPlayIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="fp-bar-wrap">
                        <div class="fp-progress" id="fpProgress">
                            <div class="fp-progress-fill" id="fpProgressFill"></div>
                            <div class="fp-progress-dot" id="fpProgressDot"></div>
                        </div>
                        <div class="fp-time">
                            <span id="fpCurrent">0:00</span>
                            <span id="fpDuration">0:00</span>
                        </div>
                    </div>
                </div>
                <a id="bangumiLink" class="btn btn-secondary full-width" href="#" target="_blank" rel="noopener">📺 查看番剧详情</a>
                <button class="btn btn-primary" data-action="nextQuestion">继续下一题 →</button>
            </div>
        </div>
    </div>

    <!-- Music Player Modal -->
    <div id="musicModal" class="music-modal">
        <div class="music-overlay" data-action="hideMusicPlayer"></div>
        <div class="music-card">
            <button class="music-close" data-action="hideMusicPlayer" aria-label="关闭">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="music-cover-wrap">
                <img id="musicCover" class="music-cover" src="" alt="" style="display:none;" onerror="this.style.display='none';document.getElementById('musicCoverFallback').style.display=''">
                <div class="music-cover-fallback" id="musicCoverFallback">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                </div>
                <span class="music-type-badge" id="musicTypeBadge"></span>
            </div>
            <div class="music-title" id="musicTitle">-</div>
            <div class="music-anime" id="musicAnime">-</div>
            <div class="music-source">via YouTube</div>
            <div class="music-controls">
                <button class="music-ctrl-btn" data-action="playPrevSong" aria-label="上一首">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 20L9 12l10-8v16z"/><rect x="5" y="4" width="2" height="16"/></svg>
                </button>
                <button class="music-play-btn" id="musicPlayBtn" data-action="toggleMusicPlay" aria-label="播放">
                    <svg id="musicPlayIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="music-ctrl-btn" data-action="playNextSong" aria-label="下一首">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4l10 8-10 8V4z"/><rect x="17" y="4" width="2" height="16"/></svg>
                </button>
            </div>
            <div class="music-actions">
                <button class="music-heart-btn" id="musicHeartBtn" data-action="toggleMusicFav" aria-label="收藏">
                    <svg id="musicHeartIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </button>
                <div class="music-vol-wrap">
                    <button class="music-vol-btn" id="musicVolBtn" aria-label="音量">
                        <svg id="musicVolIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                    <div class="music-vol-slider" id="musicVolSlider">
                        <input type="range" min="0" max="100" value="80" id="musicVolRange" orient="vertical">
                    </div>
                </div>
                <a id="musicBangumiLink" class="music-bangumi-link" href="#" target="_blank" rel="noopener" style="display:none;" title="查看番剧详情">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </a>
            </div>
            <div class="music-bar-wrap">
                <div class="music-progress" id="musicProgress">
                    <div class="music-progress-fill" id="musicProgressFill"></div>
                    <div class="music-progress-dot" id="musicProgressDot"></div>
                </div>
                <div class="music-time">
                    <span id="musicCurrent">0:00</span>
                    <span id="musicDuration">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notif" class="notif" role="status" aria-live="polite"></div>

    <div id="ytPlayerContainer" style="position:fixed;top:0;left:0;width:360px;height:200px;transform:scale(0.001);transform-origin:top left;pointer-events:none;"><div id="ytPlayerEl"></div></div>
    <script type="module" src="app.js?v=15"></script>
</body>
</html>
