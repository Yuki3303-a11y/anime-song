<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch: Dark Anime</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: #1a1520;
    color: #E8E0DC;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
}

/* === VARIANT: Dark Anime === */
/* Design philosophy: Dark background with warm coral/amber glow.
   Dramatic, immersive, "late night anime watching" vibe.
   Neon-like warm accents instead of cold blue/purple neon. */

.app {
    width: 100%;
    max-width: 780px;
    position: relative;
    z-index: 1;
}

/* Background glow effects */
.bg-glow {
    position: fixed; border-radius: 50%; pointer-events: none;
    z-index: 0; filter: blur(100px);
}
.glow-1 { width: 500px; height: 500px; background: rgba(232,141,125,0.08); top: -150px; right: -150px; }
.glow-2 { width: 400px; height: 400px; background: rgba(212,165,116,0.06); bottom: -100px; left: -100px; }
.glow-3 { width: 300px; height: 300px; background: rgba(232,141,125,0.04); top: 40%; left: 30%; }

/* Stars */
.star {
    position: fixed; width: 2px; height: 2px; border-radius: 50%;
    background: rgba(255,255,255,0.6); pointer-events: none; z-index: 0;
    animation: twinkle 3s ease-in-out infinite;
}
.star:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
.star:nth-child(2) { top: 20%; right: 20%; animation-delay: 0.8s; width: 3px; height: 3px; }
.star:nth-child(3) { top: 35%; left: 8%; animation-delay: 1.6s; }
.star:nth-child(4) { top: 50%; right: 12%; animation-delay: 2.4s; width: 1px; height: 1px; }
.star:nth-child(5) { top: 65%; left: 25%; animation-delay: 0.4s; }
.star:nth-child(6) { top: 80%; right: 30%; animation-delay: 1.2s; width: 3px; height: 3px; }
@keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

/* Header */
.header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; margin-bottom: 24px;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #E88D7D, #D4A574);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(232,141,125,0.3);
}
.logo-text {
    font-weight: 800; font-size: 18px;
    background: linear-gradient(135deg, #E88D7D, #D4A574);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    background: rgba(123,196,127,0.1);
    border: 1px solid rgba(123,196,127,0.15);
    border-radius: 20px; font-size: 12px; color: #7BC47F;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #7BC47F; box-shadow: 0 0 8px rgba(123,196,127,0.6); }

/* Hero */
.hero {
    text-align: center;
    padding: 48px 32px;
    background: rgba(255,255,255,0.03);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 0 0 1px rgba(255,255,255,0.03);
    margin-bottom: 20px;
    position: relative; overflow: hidden;
}
.hero::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #E88D7D, #D4A574, transparent);
}
.hero::after {
    content: ''; position: absolute;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 80%, rgba(232,141,125,0.06) 0%, transparent 50%);
    pointer-events: none;
}
.hero-icon {
    width: 88px; height: 88px; margin: 0 auto 20px;
    background: linear-gradient(135deg, #E88D7D, #D4A574);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(232,141,125,0.3), 0 0 60px rgba(232,141,125,0.15);
    position: relative;
}
.hero-icon::before {
    content: ''; position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(232,141,125,0.15);
    animation: ringPulse 2.5s ease-in-out infinite;
}
@keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.15); opacity: 0; }
}
.hero-title {
    font-size: 28px; font-weight: 900;
    background: linear-gradient(135deg, #E88D7D, #D4A574);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px; position: relative; z-index: 1;
}
.hero-sub { font-size: 15px; color: #8B7B7A; position: relative; z-index: 1; }
.hero-sub strong { color: #E88D7D; -webkit-text-fill-color: #E88D7D; }

/* Buttons */
.btn-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.btn {
    width: 100%; padding: 18px 24px;
    border-radius: 16px; border: none;
    font-family: inherit; font-weight: 700; font-size: 16px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 10px;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    position: relative; overflow: hidden;
}
.btn-primary {
    background: linear-gradient(135deg, #E88D7D, #D4A574);
    color: white;
    box-shadow: 0 6px 24px rgba(232,141,125,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(232,141,125,0.45); }
.btn-secondary {
    background: rgba(255,255,255,0.04); color: #E8E0DC;
    border: 1.5px solid rgba(255,255,255,0.08);
}
.btn-secondary:hover { transform: translateY(-2px); background: rgba(232,141,125,0.08); border-color: rgba(232,141,125,0.2); }

/* Footer */
.menu-footer { display: flex; gap: 8px; justify-content: center; }
.btn-ghost {
    background: transparent; border: 1px solid rgba(255,255,255,0.06);
    color: #8B7B7A; font-size: 13px; font-weight: 600; cursor: pointer;
    padding: 8px 16px; border-radius: 12px;
    font-family: inherit; transition: all 0.2s;
}
.btn-ghost:hover { color: #E88D7D; background: rgba(232,141,125,0.06); }

.variant-label {
    position: fixed; top: 12px; left: 12px;
    background: #E88D7D; color: white; padding: 6px 14px;
    border-radius: 8px; font-size: 12px; font-weight: 700;
    z-index: 100;
}
</style>
</head>
<body>
<div class="variant-label">Variant C: Dark Anime</div>
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>
<div class="bg-glow glow-3"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>

<div class="app">
    <header class="header">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 32 32" width="22" height="22">
                    <path d="M12 6C12 6 14 4 16 6C18 4 20 6 20 6L20 20C20 20 18 22 16 20C14 22 12 20 12 20Z" fill="rgba(255,255,255,0.95)"/>
                    <circle cx="12" cy="22" r="4" fill="rgba(255,255,255,0.95)"/>
                    <circle cx="20" cy="20" r="3.5" fill="rgba(255,255,255,0.9)"/>
                </svg>
            </div>
            <span class="logo-text">萌豚挑战</span>
        </div>
        <div class="status-pill">
            <div class="status-dot"></div>
            <span>在线</span>
        </div>
    </header>

    <div class="hero">
        <div class="hero-icon">
            <svg viewBox="0 0 48 48" width="40" height="40">
                <path d="M10 28C10 18 16 12 24 12C32 12 38 18 38 28" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <rect x="7" y="26" width="8" height="12" rx="3" fill="rgba(255,255,255,0.95)"/>
                <rect x="33" y="26" width="8" height="12" rx="3" fill="rgba(255,255,255,0.95)"/>
                <circle cx="21" cy="30" r="3" fill="rgba(255,255,255,0.9)"/>
                <path d="M24 30V18" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M24 18L29 16V20L24 22" fill="rgba(255,255,255,0.85)"/>
            </svg>
        </div>
        <div class="hero-title">准备好挑战了吗？</div>
        <div class="hero-sub">收录 <strong>600+</strong> 首经典动漫神曲</div>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            开始单人挑战
        </button>
        <button class="btn btn-secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            PK对战模式
        </button>
    </div>

    <div class="menu-footer">
        <button class="btn-ghost">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:4px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            设置
        </button>
        <button class="btn-ghost">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:4px;"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            排行榜
        </button>
    </div>
</div>
</body>
</html>
